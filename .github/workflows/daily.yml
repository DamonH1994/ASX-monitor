name: ASX Daily Announcements Report

on:
  # Run every weekday at 10:00 AM AEST (= 00:00 UTC)
  schedule:
    - cron: '0 0 * * 1-5'

  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write   # needed to commit report.html back to repo
  pages: write      # needed to deploy to GitHub Pages
  id-token: write

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch script
        run: python fetch_announcements.py

      - name: Commit report.html back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report.html
          git diff --staged --quiet || git commit -m "📊 ASX report $(date +'%Y-%m-%d') [auto]"
          git push

      # ── Deploy to GitHub Pages so you get a live URL ──────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # publish whole repo root (contains report.html)

  deploy-pages:
    needs: fetch-and-publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
